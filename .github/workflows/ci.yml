name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.4'

jobs:
  # ── Job 1: Static Analysis & Lint ──────────────────────────────────────────
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run dart format check
        run: dart format --set-exit-if-changed lib/ test/ || (echo "Run 'dart format lib/ test/' to fix formatting" && exit 1)

      - name: Run flutter analyze
        run: flutter analyze --fatal-infos

  # ── Job 2: Tests & Coverage ────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage thresholds
        run: |
          if [ -f coverage/lcov.info ]; then
            # Install lcov for coverage summary
            sudo apt-get install -y lcov -q
            COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | grep -oP '\d+\.\d+(?=%)' || echo "0")
            echo "Coverage: ${COVERAGE}%"
            # Warn if below 80% (hard fail when tests exist at scale)
            if (( $(echo "$COVERAGE < 60" | bc -l) )); then
              echo "⚠️ Coverage ${COVERAGE}% is below 60% minimum"
            fi
          else
            echo "No coverage data (no tests yet)"
          fi

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  # ── Job 3: Build Verification ──────────────────────────────────────────────
  build:
    name: Build (Android Debug)
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK (debug)
        run: flutter build apk --debug --no-pub

  # ── Job 4: Security Scan (Semgrep) ────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/secrets
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Scan for hardcoded secrets (fallback)
        run: |
          echo "Scanning for hardcoded secrets in lib/..."
          FOUND=0

          if grep -rn "sk-[a-zA-Z0-9]\{20,\}" lib/ 2>/dev/null; then
            echo "❌ Possible OpenAI API key found!"
            FOUND=1
          fi

          if grep -rn "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9" lib/ 2>/dev/null; then
            echo "❌ Possible hardcoded Supabase JWT found!"
            FOUND=1
          fi

          if [ $FOUND -ne 0 ]; then
            exit 1
          fi
          echo "✓ No hardcoded secrets detected"
