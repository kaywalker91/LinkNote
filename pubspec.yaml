name: linknote
description: "A mobile bookmark service to save, organize, and share web links."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  async: ^2.13.1
  cached_network_image:
  connectivity_plus:
  dio:
  envied:
  firebase_analytics:
  firebase_core:
  firebase_crashlytics:
  firebase_messaging:
  flutter:
    sdk: flutter
  flutter_riverpod:
  flutter_secure_storage:
  freezed_annotation:
  go_router:
  hive_ce:
  hive_ce_flutter:
  html: ^0.15.6
  intl:
  json_annotation:
  logger:
  retrofit:
  riverpod_annotation:
  supabase_flutter:
  url_launcher:
  uuid: ^4.5.3

dev_dependencies:
  build_runner:
  coverage:
  custom_lint:
  envied_generator:
  flutter_launcher_icons:
  flutter_native_splash:
  flutter_test:
    sdk: flutter
  freezed:
  hive_ce_generator:
  json_serializable:
  mocktail:
  plugin_platform_interface:
  retrofit_generator:
  riverpod_generator:
  riverpod_lint:
  url_launcher_platform_interface:
  very_good_analysis:

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#4A90D9"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#1A1A1A"
  image: "assets/images/splash_logo.png"
  android_12:
    color: "#FFFFFF"
    color_dark: "#1A1A1A"
    image: "assets/images/splash_logo_android12.png"
  ios: true
  android: true
  web: false
